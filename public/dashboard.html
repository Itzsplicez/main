<!DOCTYPE html>
<html>

<head>

<title>Hylex Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
background:#000;
color:white;
font-family:Poppins;

}


header{

padding:30px;
text-align:center;
position:relative;

}



.logout{

position:absolute;

right:30px;

top:30px;

padding:10px 20px;

border-radius:20px;

background:#111;

border:1px solid #333;

color:white;

cursor:pointer;

}


.logout:hover{

background:white;

color:black;

}



.container{

max-width:900px;
margin:auto;
padding:20px;

}



.website-card{

background:#111;

border:1px solid #222;

border-radius:30px;

padding:35px;

}



.online{

display:inline-block;

background:#063d18;

color:#00ff66;

padding:8px 18px;

border-radius:20px;

}



.offline{

display:inline-block;

background:#3d0606;

color:#ff4444;

padding:8px 18px;

border-radius:20px;

}



.health{

margin-top:20px;

height:12px;

background:#333;

border-radius:20px;

overflow:hidden;

}



.health-bar{

height:100%;

background:white;

transition:.5s;

}



.stats{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-top:25px;

}



.box{

background:#050505;

border:1px solid #222;

border-radius:20px;

padding:25px;

text-align:center;

}



.info{

margin-top:20px;

background:#050505;

border:1px solid #222;

border-radius:20px;

padding:20px;

}



@media(max-width:700px){

.stats{

grid-template-columns:1fr;

}


.logout{

position:static;

margin-top:15px;

}

}



</style>


</head>


<body>



<header>


<h1>Hylex Panel</h1>


<p id="user"></p>


<button class="logout" onclick="logout()">

Logout

</button>


</header>




<div class="container">



<div class="website-card">



<h2 id="domain">

Loading...

</h2>




<div id="status">

</div>




<h3>

Website Health

</h3>



<div class="health">


<div id="healthBar" class="health-bar"></div>


</div>



<p id="healthText">

</p>




<div class="info">


<p id="registered">

</p>


<p id="daysLeft">

</p>


</div>





<div class="stats">



<div class="box">


<h3>

Storage

</h3>


<p id="storage">

</p>


</div>





<div class="box">


<h3>

Uptime

</h3>


<p id="uptime">

</p>


</div>



</div>




</div>


</div>






<script>


let username = localStorage.getItem("user");



if(!username){

window.location="index.html";

}




document.getElementById("user").textContent =

"Logged in as " + username;






fetch("/user/" + username)



.then(res=>res.json())



.then(data=>{





document.getElementById("domain").textContent =

data.domain;





let status = document.getElementById("status");





if(data.status === "online"){



status.className="online";

status.textContent="● Online";



}

else{



status.className="offline";

status.textContent="● Offline";



}






document.getElementById("storage").textContent =

data.storage;






document.getElementById("uptime").textContent =

data.uptime;






document.getElementById("healthText").textContent =

data.health + "% Healthy";






document.getElementById("healthBar").style.width =

data.health + "%";






document.getElementById("registered").textContent =

"Domain Registered: " + data.serviceStarted;






document.getElementById("daysLeft").textContent =

"Plan Days Left: " + data.daysLeft + " days";





});








function logout(){


localStorage.clear();



document.cookie.split(";").forEach(cookie=>{


document.cookie =

cookie.replace(/^ +/, "")

.replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");


});



window.location="index.html";


}



</script>



</body>

</html>
