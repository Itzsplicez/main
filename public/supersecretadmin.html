<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>

<input id="adminKey" placeholder="admin key">

<br><br>

<input id="user" placeholder="user">

<input id="domain" placeholder="domain">
<input id="storage" placeholder="storage">
<input id="uptime" placeholder="uptime">
<input id="status" placeholder="status">
<input id="health" placeholder="health">

<button onclick="update()">Update User</button>

<script>

function update() {

fetch("/admin/update", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({
adminKey: document.getElementById("adminKey").value,
user: document.getElementById("user").value,
data: {
domain: document.getElementById("domain").value,
storage: document.getElementById("storage").value,
uptime: document.getElementById("uptime").value,
status: document.getElementById("status").value,
health: document.getElementById("health").value
}
})
})
.then(r => r.json())
.then(data => {
alert(JSON.stringify(data));
});

}

</script>

</body>
</html>
