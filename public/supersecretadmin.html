<!DOCTYPE html>
<html>

<head>

<title>Hylex Admin</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>


body{

margin:0;

background:#000;

color:white;

font-family:Poppins;

display:flex;

justify-content:center;

padding-top:50px;

}


.card{

background:#111;

border:1px solid #222;

border-radius:32px;

padding:40px;

width:400px;

}



input{

width:100%;

padding:13px;

margin:8px 0;

background:#050505;

border:1px solid #333;

border-radius:20px;

color:white;

}



button{

margin-top:15px;

padding:14px;

width:100%;

border-radius:25px;

border:1px solid white;

background:#111;

color:white;

}


button:hover{

background:white;

color:black;

}


</style>


</head>


<body>


<div class="card">


<h1>Hylex Admin</h1>


<input id="adminKey" placeholder="Admin Key">

<input id="user" placeholder="Username">

<input id="domain" placeholder="Domain">

<input id="storage" placeholder="Storage">

<input id="uptime" placeholder="Uptime">

<input id="status" placeholder="Status">

<input id="health" placeholder="Health %">



<button onclick="update()">
Save Changes
</button>


</div>




<script>

function update(){


fetch("/admin/update",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

adminKey:adminKey.value,

user:user.value,

data:{

domain:domain.value,

storage:storage.value,

uptime:uptime.value,

status:status.value,

health:health.value

}


})


})


.then(r=>r.json())

.then(x=>alert("Updated"));


}

</script>



</body>
</html>
